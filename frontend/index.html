<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estate Auditor - Plataforma Modular</title>
  <meta name="description" content="Plataforma modular para auditoría inmobiliaria, reportes de inversionista, flujo de caja y simulador de pipeline de proyectos." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles/main.css" />
</head>
<body>
  <nav class="sidebar">
  <img src="assets/LOGO IC 2026.png" alt="Logo" class="logo-img" />
  <h1 class="logo">Estate Auditor</h1>
    <ul class="nav-list">
      <li data-module="loader" class="active">Cargar Base</li>
      <li data-module="auditor">Auditoría</li>
      <li data-module="investor">Reporte Inversionista</li>
      <li data-module="cashflow">Flujo de Caja</li>
      <li data-module="pipeline">Simulador Pipeline</li>
    </ul>
  </nav>
  <main id="app-root" class="content">
    <!-- Cada módulo inyectará su contenido aquí -->
  </main>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
